<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEMS — Intro oficina</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{--purple:#8b5cf6;--purple-light:#a78bfa;--indigo:#6366f1}
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
  html,body{background:#04050f;height:100%;overflow:hidden}
  body{display:flex;align-items:center;justify-content:center}
  .stage{position:relative;width:100vw;max-width:1280px;aspect-ratio:16/9;overflow:hidden;border-radius:16px;
    background:radial-gradient(110% 80% at 50% 30%,#181338 0%,#0a0820 52%,#04050f 100%);box-shadow:0 50px 140px rgba(0,0,0,.7)}

  /* office window light (back wall) */
  .window{position:absolute;left:50%;top:6%;transform:translateX(-50%);width:62%;height:34%;z-index:0;
    background:linear-gradient(180deg,rgba(139,92,246,.10),transparent);
    border-radius:10px;overflow:hidden;opacity:.7}
  .window::before{content:'';position:absolute;inset:0;
    background:repeating-linear-gradient(90deg,rgba(167,139,250,.08) 0 2px,transparent 2px 46px)}
  .orb{position:absolute;border-radius:50%;filter:blur(90px);mix-blend-mode:screen;z-index:0;pointer-events:none}
  .orb.a{width:460px;height:460px;background:#8b5cf6;top:-150px;left:-80px;opacity:.38}
  .orb.b{width:380px;height:380px;background:#6366f1;bottom:-150px;right:-70px;opacity:.32}

  /* camera */
  .scene{position:absolute;inset:0;z-index:1;transform-origin:50% 49%;
    transition:transform 3.4s cubic-bezier(.5,0,.16,1);will-change:transform}
  .scene.zoom{transform:scale(3.7)}

  /* workstation pod */
  .pod{position:absolute;width:240px;height:240px;left:50%;top:50%;transform:translate(-50%,-58%)}
  .pod.side{transform:translate(-50%,-58%) scale(.8);filter:brightness(.55) blur(.4px)}
  .pod.l{left:24%}.pod.r{left:76%}

  .sil{position:absolute;left:50%;transform:translateX(-50%);top:14px;z-index:1}
  .sil .h{width:56px;height:56px;border-radius:50%;margin:0 auto;
    background:radial-gradient(circle at 50% 32%,#262247,#0c0b1c 75%);
    box-shadow:0 0 0 1px rgba(167,139,250,.14),-9px -5px 16px rgba(0,0,0,.5),9px 5px 20px rgba(139,92,246,.18)}
  .sil .b{width:152px;height:108px;margin-top:-5px;border-radius:76px 76px 22px 22px;
    background:linear-gradient(180deg,#1c1939,#0b0a1c);
    box-shadow:inset 0 9px 20px rgba(0,0,0,.5),0 0 0 1px rgba(167,139,250,.08),12px 0 26px rgba(139,92,246,.10)}

  .monitor{position:absolute;left:50%;transform:translateX(-50%);top:72px;z-index:3}
  .scr{width:202px;height:126px;border-radius:9px;background:#08080f;border:3px solid #17141f;position:relative;overflow:hidden;
    box-shadow:0 0 34px var(--scol,rgba(139,92,246,.5)),inset 0 0 32px rgba(0,0,0,.65)}
  .scrglow{position:absolute;inset:0;background:radial-gradient(64% 60% at 50% 42%,var(--scol,rgba(139,92,246,.75)),transparent 72%);opacity:.9}
  .neck{width:14px;height:18px;background:#15131f;margin:0 auto;border-radius:0 0 3px 3px}
  .foot{width:64px;height:7px;background:#15131f;margin:0 auto;border-radius:4px}

  .desk{position:absolute;left:50%;transform:translateX(-50%);top:182px;z-index:2;
    width:452px;height:26px;border-radius:9px;background:linear-gradient(180deg,#231f40,#100e22);
    box-shadow:0 20px 44px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.06)}

  /* tiles (chaos) revealed on the focus screen */
  .tiles{position:absolute;inset:0;display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:11px;opacity:0;transition:opacity .55s;z-index:2}
  .tiles.show{opacity:1}
  .tile{border-radius:6px;display:grid;place-items:center;font-size:13px;font-weight:900;color:#fff;box-shadow:0 4px 12px rgba(0,0,0,.4)}

  .cap{position:absolute;left:0;right:0;bottom:8%;z-index:6;text-align:center;opacity:0;transform:translateY(10px);transition:.55s;padding:0 8%}
  .cap.show{opacity:1;transform:translateY(0)}
  .cap .t{font-size:clamp(16px,2.3vw,29px);font-weight:800;color:#fff;letter-spacing:-.01em;text-shadow:0 2px 24px rgba(0,0,0,.7)}
  .cap .s{font-size:clamp(12px,1.35vw,15px);color:#c6cbd8;margin-top:6px;font-weight:500;text-shadow:0 2px 16px rgba(0,0,0,.7)}

  .vig{position:absolute;inset:0;z-index:7;pointer-events:none;border-radius:16px;box-shadow:inset 0 0 190px rgba(0,0,0,.72)}
  .flash{position:absolute;inset:0;z-index:8;background:#fff;opacity:0;pointer-events:none;transition:opacity .9s ease}
  .progress{position:absolute;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--purple),var(--purple-light));width:0;z-index:20}
</style>
</head>
<body>
<div class="stage" id="stage">
  <div class="window"></div>
  <div class="orb a"></div><div class="orb b"></div>
  <div class="progress" id="progress"></div>

  <div class="scene" id="scene">
    <!-- left -->
    <div class="pod side l">
      <div class="sil"><div class="h"></div><div class="b"></div></div>
      <div class="monitor"><div class="scr" style="--scol:rgba(255,122,89,.5)"><div class="scrglow"></div></div><div class="neck"></div><div class="foot"></div></div>
      <div class="desk"></div>
    </div>
    <!-- right -->
    <div class="pod side r">
      <div class="sil"><div class="h"></div><div class="b"></div></div>
      <div class="monitor"><div class="scr" style="--scol:rgba(37,99,235,.5)"><div class="scrglow"></div></div><div class="neck"></div><div class="foot"></div></div>
      <div class="desk"></div>
    </div>
    <!-- center (focus) -->
    <div class="pod">
      <div class="sil"><div class="h"></div><div class="b"></div></div>
      <div class="monitor"><div class="scr" style="--scol:rgba(139,92,246,.75)">
        <div class="scrglow"></div>
        <div class="tiles" id="tiles">
          <div class="tile" style="background:#ff7a59">H</div>
          <div class="tile" style="background:#ff3d57">T</div>
          <div class="tile" style="background:#1f2430;border:1px solid #555">N</div>
          <div class="tile" style="background:#2563eb">S</div>
        </div>
      </div><div class="neck"></div><div class="foot"></div></div>
      <div class="desk"></div>
    </div>
  </div>

  <div class="cap" id="cap"><div class="t" id="capT"></div><div class="s" id="capS"></div></div>
  <div class="vig"></div>
  <div class="flash" id="flash"></div>
</div>

<script>
const $=s=>document.querySelector(s);
const wait=ms=>new Promise(r=>setTimeout(r,ms));
function cap(t,s){const c=$('#cap');c.classList.remove('show');setTimeout(()=>{$('#capT').textContent=t;$('#capS').textContent=s||'';c.classList.add('show')},90)}

async function play(){
  // reset
  $('#scene').classList.remove('zoom');
  $('#tiles').classList.remove('show');
  $('#flash').style.opacity='0';
  $('#cap').classList.remove('show');
  $('#progress').style.transition='none';$('#progress').style.width='0';
  await wait(60);
  $('#progress').style.transition='width 8000ms linear';$('#progress').style.width='100%';

  cap('9:00 a.m. Tu equipo, en sus pantallas.','Otro día de trabajo… en mil herramientas.');
  await wait(1700);
  $('#cap').classList.remove('show');
  await wait(350);
  $('#scene').classList.add('zoom');          // zoom into center screen
  await wait(2300);
  $('#tiles').classList.add('show');           // reveal the chaos
  cap('Y detrás de cada pantalla,','el mismo desorden.');
  await wait(1900);
  $('#cap').classList.remove('show');
  await wait(350);
  $('#flash').style.opacity='1';               // white flash (corte hacia tu demo)
  await wait(1100);
  // loop
  await wait(600);
  play();
}
window.addEventListener('load',()=>setTimeout(play,400));
</script>
</body>
</html>
